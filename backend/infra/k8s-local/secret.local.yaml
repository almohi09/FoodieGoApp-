apiVersion: v1
kind: Secret
metadata:
  name: foodiego-backend-secret
  namespace: foodiego
type: Opaque
stringData:
  DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/foodiego_prod?schema=public"
  PAYMENT_WEBHOOK_SECRET: "local_dev_webhook_secret"
  MONITORING_SINK_URL: "https://example.com/ingest"
  MONITORING_SINK_AUTH_TOKEN: "local_monitoring_token"
  OTP_PROVIDER: "http"
  OTP_PROVIDER_HTTP_URL: "https://example.com/otp"
  OTP_PROVIDER_HTTP_TOKEN: "local_otp_token"
