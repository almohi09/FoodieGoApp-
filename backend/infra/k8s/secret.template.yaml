apiVersion: v1
kind: Secret
metadata:
  name: foodiego-backend-secret
  namespace: foodiego
type: Opaque
stringData:
  DATABASE_URL: "postgresql://user:password@postgres:5432/foodiego_prod?schema=public"
  PAYMENT_WEBHOOK_SECRET: "replace_me"
  MONITORING_SINK_URL: "https://monitoring.example.com/ingest"
  MONITORING_SINK_AUTH_TOKEN: "replace_me"
  OTP_PROVIDER: "http"
  OTP_PROVIDER_HTTP_URL: "https://otp-provider.example.com"
  OTP_PROVIDER_HTTP_TOKEN: "replace_me"
