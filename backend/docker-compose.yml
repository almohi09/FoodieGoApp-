services:
  postgres:
    image: postgres:16
    container_name: foodiego-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: foodiego_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d foodiego_dev"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: foodiego-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      API_PREFIX: /api/v1
      USE_POSTGRES: "true"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/foodiego_dev?schema=public
      PAYMENT_WEBHOOK_SECRET: dev_webhook_secret
    ports:
      - "4000:4000"

volumes:
  pgdata:
