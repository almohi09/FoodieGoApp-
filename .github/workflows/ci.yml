name: ci

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --runInBand

  backend-release-gate:
    runs-on: ubuntu-latest
    needs: test-and-lint
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: foodiego_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d foodiego_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/foodiego_ci?schema=public
      USE_POSTGRES: "true"
      PAYMENT_WEBHOOK_SECRET: ci_webhook_secret
      NODE_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Apply migrations
        working-directory: backend
        run: npm run prisma:migrate:deploy

      - name: Seed CI database
        working-directory: backend
        run: npm run db:seed

      - name: Backend strict release gate
        working-directory: backend
        run: npm run release:gate:strict

      - name: Backend production cutover policy gate
        working-directory: backend
        run: |
          NODE_ENV=production \
          USE_POSTGRES=true \
          DATABASE_URL="$DATABASE_URL" \
          PAYMENT_WEBHOOK_SECRET=ci_webhook_secret \
          OTP_PROVIDER=http \
          OTP_PROVIDER_HTTP_URL=https://otp-provider.example.com \
          OTP_PROVIDER_HTTP_TOKEN=ci_otp_token \
          MONITORING_SINK_URL=https://monitoring.example.com/ingest \
          MONITORING_SINK_AUTH_TOKEN=ci_monitoring_token \
          MONITORING_EMIT_REQUEST_EVENTS=true \
          OTP_BYPASS_CODE= \
          npm run cutover:check

  e2e-smoke:
    runs-on: ubuntu-latest
    needs: [test-and-lint, backend-release-gate]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: E2E Smoke Gate
        run: npm run test:e2e:smoke

  e2e-detox-android:
    runs-on: ubuntu-latest
    needs: e2e-smoke
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Build and Run Detox on Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          emulator-boot-timeout: 1200
          disable-animations: true
          script: |
            npm run build:e2e:detox:android
            npm run test:e2e:detox
